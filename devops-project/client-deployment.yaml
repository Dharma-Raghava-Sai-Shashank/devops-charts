apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      component: web
  template:
    metadata:
      labels:
        component: web
      annotations:
        image-tag: fa0e849
    spec:
      containers:
        - name: client 
          image: shashank1411/multi-client
          ports:
            - containerPort: 3000

      
